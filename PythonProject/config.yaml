# ==========================================================
# CONFIG FOR MULTI-ARMED BANDIT EXPERIMENT
# Works with the new main.py / main_new.py version
# ==========================================================

# -------- BLOCKS --------
numberOfBlocks: 20
trialsPerBlockMin: 18
trialsPerBlockMax: 23
practiceTrials: 5

# -------- TIMINGS, IN MILLISECONDS --------
fixationDuration: 800
decisionTimeout: 4000
feedbackDuration: 1000
itiMin: 800
itiMax: 1200

# -------- REWARDS --------
rewardWinValue: 1
rewardLossValue: 0
expectedValuesArray:
  - 0.20
  - 0.35
  - 0.50
  - 0.65
  - 0.80

# -------- KEYS --------
leftKey: left
rightKey: right
quitKey: escape
continueKey: space

# -------- APPEARANCE --------
backgroundColor: [200, 200, 200]
colorSpace: rgb255
textColor: black
textFont: Arial
instructionTextHeight: 0.034
instructionWrapWidth: 1.30

# Window / visual layout
# In PsychoPy height units. You can adjust these if the images are too big/small.
# If preserveMachineAspect is true, machineSize is only fallback.
preserveMachineAspect: true
machineHeight: 0.50
machineSize:
  - 0.34
  - 0.50
stimulusSize:
  - 0.135
  - 0.135
leftMachinePos:
  - -0.36
  - 0.00
rightMachinePos:
  - 0.36
  - 0.00

# Vertical offset of the stimulus relative to the machine center.
# If the stimulus is not exactly inside the machine screen, change this value.
# More positive = higher, more negative = lower.
stimulusYOffset: -0.04
stimulusXOffset: -0.02



# -------- FIXATION / SAVING --------
# The fixation cross is shown only at the beginning of practice and each block.
showFixationEachTrial: false
showFixationAtBlockStart: true

# Saves/overwrites the CSV after every trial, so data is not lost if the task stops early.
saveAfterEachTrial: true

# -------- IMAGE PATHS --------
imageFolder: images

# These files should exist in the images folder:
# images/machine_idle.png
# images/machine_win.png
# images/machine_loss.png
machineIdleImage: machine_idle
machineWinImage: machine_win
machineLossImage: machine_loss

# Stimuli are generated by generate_images.py and named like:
# kolo_paski_pionowe_czerwony.png
# kwadrat_kropki_zielony.png
stimulusExtension: .png

# -------- PRACTICE --------
# According to the specification, practice uses 5 trials and fixed probabilities:
# left = 0.8, right = 0.2
practiceLeftEV: 0.8
practiceRightEV: 0.2

# -------- RESULTS --------
resultsFolder: results

# -------- INSTRUCTIONS --------
instructionPages:
  - |
    Witamy! Wyobraź sobie, że odwiedzasz serię wirtualnych kasyn.

    W każdym kasynie znajdziesz kilka automatów do gry oznaczonych różnymi symbolami.

    Twoim zadaniem będzie zebranie jak największej liczby punktów.

    Naciśnij SPACJĘ, aby przejść dalej.

  - |
    W każdej próbie na ekranie pojawią się dwa automaty.
    Musisz wybrać jeden z nich:

    Naciśnij STRZAŁKĘ W LEWO, aby wybrać lewy automat.
    Naciśnij STRZAŁKĘ W PRAWO, aby wybrać prawy automat.

    Na podjęcie decyzji masz maksymalnie 4 sekundy.
    Postaraj się reagować w miarę szybko.

    Naciśnij SPACJĘ, aby przejść dalej.

  - |
    Automaty różnią się od siebie.

    Niektóre częściej dają wygraną, a inne częściej nic nie dają.

    Twoim celem jest zorientowanie się, które maszyny w danym kasynie są najbardziej opłacalne,
    i wybieranie ich jak najczęściej.

    Naciśnij SPACJĘ, aby przejść dalej.

  - |
    Co jakiś czas przejdziesz do nowego kasyna.

    Uwaga: w nowym kasynie zasady gry ulegają zmianie!

    Nawet jeśli rozpoznasz automat, na którym grałeś/grałaś wcześniej,
    jego szansa na wygraną mogła ulec zmianie.

    W każdym nowym kasynie musisz odkrywać opłacalność maszyn od nowa.

    Naciśnij SPACJĘ, aby przejść dalej.

  - |
    Zadanie rozpocznie się od krótkiego treningu,
    abyś mógł/mogła zapoznać się z klawiszami.

    Potem rozpocznie się właściwa gra.

    Powodzenia!

    Naciśnij SPACJĘ, aby rozpocząć.

# Optional ending message. Your main.py can use this if implemented.
instructionEnd: |
  Dziękujemy za udział w badaniu.
